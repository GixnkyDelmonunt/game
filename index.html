<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Profile Game Viewer</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-box {
            display: flex;
            gap: 0.5rem;
            max-width: 500px;
            margin: 0 auto 2rem;
        }

        input {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #1e293b;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            border: none;
            background: var(--accent);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--accent-hover);
        }

        #error-msg {
            color: var(--error);
            text-align: center;
            margin-bottom: 1rem;
            display: none;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .thumbnail-wrapper {
            width: 100%;
            aspect-ratio: 16/9;
            background: #0f172a;
            position: relative;
        }

        .thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-info {
            padding: 1.25rem;
            flex-grow: 1;
        }

        .game-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .game-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .play-btn {
            display: block;
            text-align: center;
            background: #334155;
            color: white;
            text-decoration: none;
            padding: 0.6rem;
            margin-top: 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .play-btn:hover {
            background: #475569;
        }

        /* Loading Spinner */
        .loader {
            display: none;
            width: 30px;
            height: 30px;
            border: 3px solid #334155;
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Roblox Game Finder</h1>
            <p style="color: var(--text-secondary)">Enter a User ID or Username to view their public games</p>
        </header>

        <div class="search-box">
            <input type="text" id="userInput" placeholder="User ID or Username..." autofocus>
            <button onclick="fetchGames()">Search</button>
        </div>

        <div id="error-msg"></div>
        <div class="loader" id="loader"></div>
        <div class="games-grid" id="gamesGrid"></div>
    </div>

    <script>
        const gamesGrid = document.getElementById('gamesGrid');
        const errorMsg = document.getElementById('error-msg');
        const loader = document.getElementById('loader');

        async function fetchGames() {
            const input = document.getElementById('userInput').value.trim();
            if (!input) return;

            // Reset UI
            gamesGrid.innerHTML = '';
            errorMsg.style.display = 'none';
            loader.style.display = 'block';

            try {
                let userId = input;

                // 1. If input is not a number, look up the ID by username
                if (isNaN(input)) {
                    const userRes = await fetch('https://users.roproxy.com/v1/usernames/users', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ usernames: [input], excludeBannedUsers: true })
                    });
                    const userData = await userRes.json();
                    
                    if (!userData.data || userData.data.length === 0) {
                        throw new Error("User not found.");
                    }
                    userId = userData.data[0].id;
                }

                // 2. Fetch the games using the provided API
                const gamesUrl = `https://games.roproxy.com/v2/users/${userId}/games?sortOrder=Asc&limit=50`;
                const gamesRes = await fetch(gamesUrl);
                const gamesData = await gamesRes.json();

                if (!gamesData.data || gamesData.data.length === 0) {
                    throw new Error("This user has no public games.");
                }

                // 3. Fetch thumbnails for the games
                // We extract universeIds for the thumbnail API
                const universeIds = gamesData.data.map(g => g.id).join(',');
                const thumbRes = await fetch(`https://thumbnails.roproxy.com/v1/games/icons?universeIds=${universeIds}&returnPolicy=PlaceHolder&size=150x150&format=Png&isCircular=false`);
                const thumbData = await thumbRes.json();
                
                // Map thumbnails to a helper object for easy lookup
                const thumbMap = {};
                thumbData.data.forEach(t => thumbMap[t.targetId] = t.imageUrl);

                // 4. Render the games
                renderGames(gamesData.data, thumbMap);

            } catch (err) {
                errorMsg.innerText = err.message;
                errorMsg.style.display = 'block';
            } finally {
                loader.style.display = 'none';
            }
        }

        function renderGames(games, thumbMap) {
            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                
                const thumbUrl = thumbMap[game.id] || 'https://tr.rbxcdn.com/53ebcb10178495a43064e43f32617f65/150/150/Image/Png';
                const lastUpdated = new Date(game.updated).toLocaleDateString();

                card.innerHTML = `
                    <div class="thumbnail-wrapper">
                        <img src="${thumbUrl}" class="thumbnail" alt="${game.name}">
                    </div>
                    <div class="game-info">
                        <div class="game-title">${game.name}</div>
                        <div class="game-meta">
                            <span>📊 ${game.placeVisits.toLocaleString()} Visits</span>
                            <span>📅 Updated: ${lastUpdated}</span>
                        </div>
                        <a href="https://www.roblox.com/games/${game.rootPlace.id}" target="_blank" class="play-btn">View on Roblox</a>
                    </div>
                `;
                gamesGrid.appendChild(card);
            });
        }

        // Allow "Enter" key to trigger search
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchGames();
        });
    </script>
</body>
</html>
