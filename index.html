<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Game Finder</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --error: #f43f5e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container { width: 100%; max-width: 900px; text-align: center; }

        h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 800; letter-spacing: -1px; }
        p { color: var(--text-dim); margin-bottom: 30px; }

        .search-bar {
            display: flex;
            gap: 10px;
            background: var(--card);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid #334155;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px 15px;
            font-size: 1rem;
            outline: none;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background: #2563eb; }
        button:disabled { background: #475569; cursor: not-allowed; }

        #status { margin-bottom: 20px; font-size: 0.9rem; font-weight: 600; }
        .error { color: var(--error); }
        .loading { color: var(--accent); }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .game-card {
            background: var(--card);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.2s;
            border: 1px solid #334155;
            text-align: left;
        }

        .game-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .game-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            object-fit: cover;
        }

        .game-content { padding: 15px; }
        .game-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .game-stats { font-size: 0.85rem; color: var(--text-dim); }

        .btn-view {
            display: inline-block;
            margin-top: 15px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Game Finder</h1>
        <p>Enter a Roblox Username (e.g. Builderman) or a User ID (e.g. 1)</p>

        <div class="search-bar">
            <input type="text" id="targetInput" placeholder="Username or User ID..." spellcheck="false">
            <button id="searchBtn" onclick="startSearch()">View Games</button>
        </div>

        <div id="status"></div>
        <div id="gameGrid" class="game-grid"></div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const grid = document.getElementById('gameGrid');
        const btn = document.getElementById('searchBtn');

        async function startSearch() {
            const input = document.getElementById('targetInput').value.trim();
            if (!input) return;

            // Reset UI
            grid.innerHTML = '';
            statusDiv.className = 'loading';
            statusDiv.innerText = 'Searching for user...';
            btn.disabled = true;

            try {
                let userId = input;

                // Step 1: If input is NOT a number, convert Username to ID
                if (isNaN(input)) {
                    // We use the search endpoint to find the user ID from the name
                    const userLookup = await fetch(`https://users.roproxy.com/v1/users/search?keyword=${input}&limit=1`);
                    const userData = await userLookup.json();

                    if (!userData.data || userData.data.length === 0) {
                        throw new Error("User not found. Try a User ID instead.");
                    }
                    
                    userId = userData.data[0].id;
                    statusDiv.innerText = `Found User ID: ${userId}. Fetching games...`;
                }

                // Step 2: Fetch Games using the numeric ID
                // We use accessFilter=2 to ensure we get Public games
                const gamesUrl = `https://games.roproxy.com/v2/users/${userId}/games?accessFilter=2&sortOrder=Asc&limit=50`;
                const gamesRes = await fetch(gamesUrl);
                const gamesData = await gamesRes.json();

                if (!gamesData.data || gamesData.data.length === 0) {
                    throw new Error("No public games found for this user.");
                }

                // Step 3: Get Thumbnails for the games
                const universeIds = gamesData.data.map(g => g.id).join(',');
                const thumbRes = await fetch(`https://thumbnails.roproxy.com/v1/games/icons?universeIds=${universeIds}&size=150x150&format=Png&isCircular=false`);
                const thumbData = await thumbRes.json();
                const thumbMap = {};
                if (thumbData.data) {
                    thumbData.data.forEach(t => thumbMap[t.targetId] = t.imageUrl);
                }

                // Step 4: Render
                statusDiv.innerText = `Showing ${gamesData.data.length} games`;
                statusDiv.className = '';
                
                gamesData.data.forEach(game => {
                    const icon = thumbMap[game.id] || 'https://tr.rbxcdn.com/53ebcb10178495a43064e43f32617f65/150/150/Image/Png';
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <img src="${icon}" class="game-thumb">
                        <div class="game-content">
                            <div class="game-name">${game.name}</div>
                            <div class="game-stats">
                                👥 ${game.placeVisits.toLocaleString()} Visits<br>
                                ⭐ ${game.favoritedCount || 0} Favorites
                            </div>
                            <a href="https://www.roblox.com/games/${game.rootPlace.id}" target="_blank" class="btn-view">View on Roblox →</a>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (err) {
                statusDiv.className = 'error';
                statusDiv.innerText = err.message;
            } finally {
                btn.disabled = false;
            }
        }

        // Allow pressing Enter to search
        document.getElementById('targetInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startSearch();
        });
    </script>
</body>
</html>
