<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Game Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --card-bg: #161b22;
            --accent: #0084ff;
            --text: #ffffff;
            --text-dim: #8b949e;
            --border: #30363d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 10px; }
        .header p { color: var(--text-dim); }

        .search-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
        }

        input {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--accent); }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
        button:disabled { background: #444; cursor: not-allowed; }

        .error { color: #ff4d4d; margin-bottom: 20px; display: none; }

        .loader {
            display: none;
            width: 40px;
            height: 40px;
            border: 3px solid #30363d;
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
            margin: 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        .game-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .game-card:hover { transform: translateY(-5px); }

        .thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            object-fit: cover;
        }

        .game-info { padding: 16px; }
        .game-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .game-stats { font-size: 0.85rem; color: var(--text-dim); display: flex; gap: 15px; }
        
        .play-link {
            display: inline-block;
            margin-top: 15px;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .play-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Player Game Finder</h1>
        <p>Enter a Roblox Username or User ID</p>
    </div>

    <div class="search-container">
        <input type="text" id="userInput" placeholder="e.g. Builderman or 156" spellcheck="false">
        <button id="searchBtn" onclick="handleSearch()">Search</button>
    </div>

    <div id="errorBox" class="error"></div>
    <div id="loader" class="loader"></div>
    <div id="gamesGrid" class="games-grid"></div>

    <script>
        const userInput = document.getElementById('userInput');
        const searchBtn = document.getElementById('searchBtn');
        const gamesGrid = document.getElementById('gamesGrid');
        const errorBox = document.getElementById('errorBox');
        const loader = document.getElementById('loader');

        async function handleSearch() {
            const query = userInput.value.trim();
            if (!query) return;

            // Reset UI
            gamesGrid.innerHTML = '';
            errorBox.style.display = 'none';
            loader.style.display = 'block';
            searchBtn.disabled = true;

            try {
                let userId = query;

                // If input contains letters, it's a username. We need to find the ID.
                if (isNaN(query)) {
                    // Using Search API (GET) which is better for RoProxy CORS than the POST Usernames API
                    const searchUrl = `https://users.roproxy.com/v1/users/search?keyword=${encodeURIComponent(query)}&limit=1`;
                    const userRes = await fetch(searchUrl);
                    const userData = await userRes.json();

                    if (!userData.data || userData.data.length === 0) {
                        throw new Error("User not found.");
                    }
                    userId = userData.data[0].id;
                }

                // Fetch Games
                const gamesUrl = `https://games.roproxy.com/v2/users/${userId}/games?sortOrder=Asc&limit=50`;
                const gamesRes = await fetch(gamesUrl);
                const gamesData = await gamesRes.json();

                if (!gamesData.data || gamesData.data.length === 0) {
                    throw new Error("This user has no public games.");
                }

                renderGames(gamesData.data);

            } catch (err) {
                errorBox.innerText = err.message;
                errorBox.style.display = 'block';
            } finally {
                loader.style.display = 'none';
                searchBtn.disabled = false;
            }
        }

        async function renderGames(games) {
            // Get thumbnails in a batch for better performance
            const universeIds = games.map(g => g.id).join(',');
            let thumbs = {};
            
            try {
                const thumbRes = await fetch(`https://thumbnails.roproxy.com/v1/games/icons?universeIds=${universeIds}&size=150x150&format=Png&isCircular=false`);
                const thumbData = await thumbRes.json();
                thumbData.data.forEach(t => thumbs[t.targetId] = t.imageUrl);
            } catch (e) { console.log("Thumbnail fetch failed"); }

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                
                const thumbImg = thumbs[game.id] || 'https://tr.rbxcdn.com/53ebcb10178495a43064e43f32617f65/150/150/Image/Png';

                card.innerHTML = `
                    <img src="${thumbImg}" class="thumbnail" alt="Game Icon">
                    <div class="game-info">
                        <div class="game-name">${game.name}</div>
                        <div class="game-stats">
                            <span>👍 ${game.totalUpVotes || 0}</span>
                            <span>👥 ${game.placeVisits.toLocaleString()} visits</span>
                        </div>
                        <a href="https://www.roblox.com/games/${game.rootPlace.id}" target="_blank" class="play-link">View Game →</a>
                    </div>
                `;
                gamesGrid.appendChild(card);
            });
        }

        // Listen for Enter key
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });
    </script>
</body>
</html>
