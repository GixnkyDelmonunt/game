<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Game Viewer</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #141414;
            --border: #252525;
            --text-main: #ffffff;
            --text-dim: #888888;
            --accent: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 60px 20px;
        }

        .container { width: 100%; max-width: 900px; }

        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 2.5rem; letter-spacing: -2px; margin-bottom: 8px; font-weight: 800; }
        header p { color: var(--text-dim); }

        .search-area {
            display: flex;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 50px;
            transition: var(--transition);
        }

        .search-area:focus-within { border-color: #555; transform: translateY(-2px); }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 15px 20px;
            font-size: 1.1rem;
        }

        button {
            background: var(--accent);
            color: black;
            border: none;
            padding: 0 30px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        button:hover { opacity: 0.8; }

        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
            animation: show 0.5s forwards;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        @keyframes show { to { opacity: 1; transform: translateY(0); } }

        .game-card:hover { border-color: #666; background: #1a1a1a; }

        .game-icon {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            background: #222;
            margin-bottom: 15px;
            object-fit: cover;
        }

        .menu-container {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .menu-dots {
            cursor: pointer;
            padding: 5px;
            color: var(--text-dim);
            transition: 0.2s;
            border-radius: 50%;
        }
        .menu-dots:hover { color: white; background: #222; }

        .dropdown {
            position: absolute;
            right: 0;
            top: 35px;
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 140px;
            display: none;
            z-index: 10;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .dropdown.active { display: block; }

        .dropdown-item {
            padding: 12px 15px;
            font-size: 0.8rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }
        .dropdown-item:hover { background: #252525; }

        .game-name { font-weight: 700; font-size: 1.1rem; margin-bottom: 5px; padding-right: 25px; }
        .game-desc { 
            font-size: 0.85rem; 
            color: var(--text-dim); 
            line-height: 1.4; 
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .badge-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
        .badge {
            background: #222;
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.75rem;
            color: #ccc;
        }

        .go-btn {
            background: transparent;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            width: 100%;
            border-radius: 12px;
            font-size: 0.85rem;
            text-decoration: none;
            text-align: center;
            margin-top: auto;
            transition: 0.2s;
        }
        .go-btn:hover { background: white; color: black; }

        .loader { display: none; text-align: center; color: var(--text-dim); padding: 20px; font-style: italic; }
        .error-msg { display: none; color: #ff5555; text-align: center; background: #201010; padding: 15px; border-radius: 12px; border: 1px solid #402020; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ARCHIVE</h1>
            <p>Enter a Roblox Player ID to fetch their games</p>
        </header>

        <div id="error" class="error-msg"></div>

        <div class="search-area">
            <input type="text" id="userInput" placeholder="Enter Player ID (e.g. 1)" spellcheck="false">
            <button id="searchBtn">FETCH</button>
        </div>

        <div id="loader" class="loader">Querying Roblox API...</div>

        <div id="results"></div>
    </div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const userInput = document.getElementById('userInput');
        const resultsContainer = document.getElementById('results');
        const loader = document.getElementById('loader');
        const errorEl = document.getElementById('error');

        searchBtn.addEventListener('click', startSearch);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') startSearch(); });

        window.onclick = (e) => {
            if (!e.target.matches('.menu-dots') && !e.target.closest('.menu-dots')) {
                document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active'));
            }
        };

        async function startSearch() {
            const query = userInput.value.trim();
            if(!query || isNaN(query)) {
                showError("Please enter a valid numeric Player ID.");
                return;
            }

            resultsContainer.innerHTML = '';
            errorEl.style.display = 'none';
            loader.style.display = 'block';
            searchBtn.disabled = true;

            try {
                await fetchGames(query);
            } catch (err) {
                showError(err.message);
            } finally {
                loader.style.display = 'none';
                searchBtn.disabled = false;
            }
        }

        async function fetchGames(userId) {
            const res = await fetch(`https://games.roproxy.com/v2/users/${userId}/games?sortOrder=Asc&limit=50`);
            if (!res.ok) throw new Error("Could not fetch games. Profile may be private.");
            
            const data = await res.json();
            if (!data.data || data.data.length === 0) throw new Error("No public games found for this ID.");

            const universeIds = data.data.map(g => g.id).join(',');
            const thumbRes = await fetch(`https://thumbnails.roproxy.com/v1/games/icons?universeIds=${universeIds}&returnPolicy=PlaceHolder&size=150x150&format=Png&isCircular=false`);
            const thumbData = await thumbRes.json();
            
            data.data.forEach((game, i) => {
                const iconObj = thumbData.data?.find(t => t.targetId === game.id);
                const iconUrl = iconObj ? iconObj.imageUrl : '';
                
                // IMPORTANT: Roblox website uses rootPlaceId for game links, not the universe ID (id)
                const realPlaceId = game.rootPlaceId;

                const card = document.createElement('div');
                card.className = 'game-card';
                card.style.animationDelay = `${i * 0.05}s`;
                card.innerHTML = `
                    <div class="menu-container">
                        <div class="menu-dots" onclick="toggleMenu(event, ${i})">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
                        </div>
                        <div class="dropdown" id="drop-${i}">
                            <div class="dropdown-item" onclick="copyId('${realPlaceId}')">Copy Place ID</div>
                            <div class="dropdown-item" onclick="window.open('https://www.roblox.com/games/${realPlaceId}', '_blank')">Open Website</div>
                        </div>
                    </div>
                    <img class="game-icon" src="${iconUrl}" alt="icon">
                    <div class="game-name">${game.name}</div>
                    <div class="game-desc">${game.description || 'No description provided.'}</div>
                    <div class="badge-row">
                        <div class="badge">Active: ${game.playing || 0}</div>
                        <div class="badge">⭐ ${game.favoritedCount || 0}</div>
                    </div>
                    <a href="https://www.roblox.com/games/${realPlaceId}" target="_blank" class="go-btn">Visit Website</a>
                `;
                resultsContainer.appendChild(card);
            });
        }

        function toggleMenu(event, index) {
            event.stopPropagation();
            const target = document.getElementById(`drop-${index}`);
            const isActive = target.classList.contains('active');
            document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('active'));
            if (!isActive) target.classList.add('active');
        }

        function copyId(id) {
            navigator.clipboard.writeText(id).then(() => {
                alert("Place ID copied: " + id);
            });
        }

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
        }
    </script>
</body>
</html>
