<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Game Viewer</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #141414;
            --border: #252525;
            --text-main: #ffffff;
            --text-dim: #888888;
            --accent: #ffffff;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 60px 20px;
        }

        .container { width: 100%; max-width: 900px; }

        header { text-align: center; margin-bottom: 40px; }
        header h1 { font-size: 2.5rem; letter-spacing: -2px; margin-bottom: 8px; font-weight: 800; }
        header p { color: var(--text-dim); }

        .search-area {
            display: flex;
            background: var(--card-bg);
            padding: 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            margin-bottom: 50px;
            transition: var(--transition);
        }

        .search-area:focus-within { border-color: #555; transform: translateY(-2px); }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 15px 20px;
            font-size: 1.1rem;
        }

        button {
            background: var(--accent);
            color: black;
            border: none;
            padding: 0 30px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        button:hover { opacity: 0.8; }

        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .game-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            transition: var(--transition);
            opacity: 0;
            transform: translateY(20px);
            animation: show 0.5s forwards;
        }

        @keyframes show { to { opacity: 1; transform: translateY(0); } }

        .game-card:hover { border-color: #666; background: #1a1a1a; }

        .game-name { font-weight: 700; font-size: 1.2rem; margin-bottom: 5px; }
        .game-desc { font-size: 0.85rem; color: var(--text-dim); line-height: 1.4; margin-bottom: 15px; }
        
        .badge {
            background: #222;
            padding: 5px 12px;
            border-radius: 10px;
            font-size: 0.75rem;
            color: #ccc;
            display: inline-block;
        }

        .loader { display: none; text-align: center; color: var(--text-dim); padding: 20px; font-style: italic; }
        .error-msg { display: none; color: #ff5555; text-align: center; background: #201010; padding: 15px; border-radius: 12px; border: 1px solid #402020; margin-bottom: 20px; }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>ARCHIVE</h1>
            <p>Enter a Roblox username or ID to fetch experiences</p>
        </header>

        <div id="error" class="error-msg"></div>

        <div class="search-area">
            <input type="text" id="userInput" placeholder="Search Roblox User..." spellcheck="false">
            <button id="searchBtn">SEARCH</button>
        </div>

        <div id="loader" class="loader">Querying databases...</div>

        <div id="results"></div>
    </div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const userInput = document.getElementById('userInput');
        const resultsContainer = document.getElementById('results');
        const loader = document.getElementById('loader');
        const errorEl = document.getElementById('error');

        searchBtn.addEventListener('click', startSearch);
        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') startSearch(); });

        async function startSearch() {
            const query = userInput.value.trim();
            if(!query) return;

            // Reset
            resultsContainer.innerHTML = '';
            errorEl.style.display = 'none';
            loader.style.display = 'block';
            searchBtn.disabled = true;

            try {
                let targetId = query;

                // If input is text, we search for the ID
                if (isNaN(query)) {
                    console.log(`Resolving username: ${query}`);
                    targetId = await fetchUserId(query);
                }

                console.log(`Fetching games for ID: ${targetId}`);
                await fetchGames(targetId);

            } catch (err) {
                console.error(err);
                errorEl.textContent = err.message;
                errorEl.style.display = 'block';
            } finally {
                loader.style.display = 'none';
                searchBtn.disabled = false;
            }
        }

        async function fetchUserId(name) {
            // Using the Search GET endpoint (more browser friendly)
            const res = await fetch(`https://users.roproxy.com/v1/users/search?keyword=${name}&limit=1`);
            const data = await res.json();

            if (data.data && data.data.length > 0) {
                return data.data[0].id;
            } else {
                throw new Error("User not found. Try the exact Username or ID.");
            }
        }

        async function fetchGames(id) {
            const res = await fetch(`https://games.roproxy.com/v2/users/${id}/games?sortOrder=Asc&limit=50`);
            
            if (!res.ok) throw new Error("Could not access games (Proxy Error or Private profile).");
            
            const data = await res.json();
            
            if (!data.data || data.data.length === 0) {
                throw new Error("This user has no public games listed.");
            }

            data.data.forEach((game, i) => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.style.animationDelay = `${i * 0.05}s`;
                card.innerHTML = `
                    <div class="game-name">${game.name}</div>
                    <div class="game-desc">${game.description || 'No description provided.'}</div>
                    <div class="badge">Active: ${game.playing || 0}</div>
                    <div class="badge">⭐ ${game.favoritedCount || 0}</div>
                `;
                resultsContainer.appendChild(card);
            });
        }
    </script>
</body>
</html>
