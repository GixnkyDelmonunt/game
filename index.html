<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Game Viewer</title>
    <style>
        /* --- CSS STYLES --- */
        :root {
            --bg: #0f0f0f;
            --card-bg: #1a1a1a;
            --border: #333;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --accent: #ffffff;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .container {
            width: 100%;
            max-width: 800px;
            animation: fadeInUp 0.8s ease-out;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-dim);
            font-size: 1rem;
        }

        /* Search Area */
        .search-box {
            display: flex;
            gap: 10px;
            background: var(--card-bg);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid var(--border);
            transition: var(--transition);
            margin-bottom: 40px;
        }

        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(255,255,255,0.05);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            padding: 12px 15px;
            font-size: 1rem;
        }

        button {
            background: var(--accent);
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        button:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
        }

        /* Results Grid */
        #results {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border);
            padding: 20px;
            transition: var(--transition);
            animation: fadeInUp 0.5s ease-out forwards;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .game-card:hover {
            border-color: #555;
            transform: translateY(-5px);
            background: #222;
        }

        .game-title {
            font-weight: 600;
            font-size: 1.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .game-stats {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .status-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            background: #333;
            font-size: 0.75rem;
            width: fit-content;
        }

        /* Feedback UI */
        .loader {
            display: none;
            text-align: center;
            padding: 40px;
            font-weight: 500;
            color: var(--text-dim);
            animation: pulse 1.5s infinite;
        }

        .error {
            color: #ff4444;
            text-align: center;
            margin-top: 20px;
            display: none;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Discovery</h1>
            <p>Enter a Roblox Username or ID to view their games</p>
        </header>

        <div class="search-box">
            <input type="text" id="userInput" placeholder="Search username or ID..." autocomplete="off">
            <button id="searchBtn">Search</button>
        </div>

        <div id="loader" class="loader">Fetching data from the cloud...</div>
        <div id="error" class="error"></div>

        <div id="results">
            <!-- Game cards will appear here -->
        </div>
    </div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */

        const searchBtn = document.getElementById('searchBtn');
        const userInput = document.getElementById('userInput');
        const resultsContainer = document.getElementById('results');
        const loader = document.getElementById('loader');
        const errorEl = document.getElementById('error');

        searchBtn.addEventListener('click', handleSearch);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });

        async function handleSearch() {
            const query = userInput.value.trim();
            if (!query) return;

            // Reset UI
            resultsContainer.innerHTML = '';
            errorEl.style.display = 'none';
            loader.style.display = 'block';
            searchBtn.disabled = true;

            try {
                let userId = query;

                // If input is not a pure number, it's a username
                if (isNaN(query)) {
                    userId = await getUserIdFromName(query);
                }

                await fetchGames(userId);
            } catch (err) {
                showError(err.message);
            } finally {
                loader.style.display = 'none';
                searchBtn.disabled = false;
            }
        }

        async function getUserIdFromName(username) {
            try {
                const response = await fetch(`https://users.roproxy.com/v1/usernames/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usernames: [username], excludeBannedUsers: true })
                });
                const data = await response.json();
                
                if (data.data && data.data.length > 0) {
                    return data.data[0].id;
                } else {
                    throw new Error("User not found");
                }
            } catch (e) {
                throw new Error("Could not resolve username. (Check spelling or proxy status)");
            }
        }

        async function fetchGames(id) {
            const response = await fetch(`https://games.roproxy.com/v2/users/${id}/games?sortOrder=Asc&limit=50`);
            
            if (!response.ok) throw new Error("Could not fetch games for this ID.");
            
            const data = await response.json();
            
            if (!data.data || data.data.length === 0) {
                showError("No public games found for this user.");
                return;
            }

            renderGames(data.data);
        }

        function renderGames(games) {
            resultsContainer.innerHTML = games.map((game, index) => `
                <div class="game-card" style="animation-delay: ${index * 0.05}s">
                    <div class="game-title">${game.name}</div>
                    <div class="status-tag">${game.creator.name}</div>
                    <div class="game-stats">
                        <span>👍 ${game.totalUpVotes || 0}</span>
                        <span>👥 ${game.playing || 0} active</span>
                    </div>
                </div>
            `).join('');
        }

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
        }
    </script>
</body>
</html>
